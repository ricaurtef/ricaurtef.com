name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - "*.html"
      - "*.css"
      - "*.js"
      - "es/**"
      - "img/**"

permissions:
  contents: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
          role-chaining: true

      - name: Cache-bust asset references
        run: |
          CSS_HASH=$(md5sum style.css | cut -c1-8)
          JS_HASH=$(md5sum theme.js | cut -c1-8)
          sed -i "s|style\.css|style.css?v=${CSS_HASH}|g" index.html es/index.html 404.html
          sed -i "s|theme\.js|theme.js?v=${JS_HASH}|g" index.html es/index.html 404.html

      # HTML: short cache (5 min) so visitors see updates quickly
      - name: Sync HTML
        run: |
          aws s3 sync . s3://${{ vars.SITE_BUCKET }}/ \
            --delete \
            --cache-control "public, max-age=300" \
            --exclude "*" \
            --include "*.html" \
            --include "es/*.html"

      # Assets: long cache (1 year) — CSS/JS/images rarely change
      - name: Sync assets
        run: |
          aws s3 sync . s3://${{ vars.SITE_BUCKET }}/ \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --exclude ".github/*" \
            --exclude ".gitignore" \
            --exclude "LICENSE" \
            --exclude "README.md"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CF_DISTRIBUTION_ID }} \
            --paths "/*"

  release:
    name: Release
    needs: [deploy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          git fetch --tags
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || true)

          if [[ -z "$LATEST" ]]; then
            NEXT="v1.0.0"
          else
            MAJOR=$(echo "$LATEST" | cut -d. -f1 | tr -d v)
            MINOR=$(echo "$LATEST" | cut -d. -f2)
            PATCH=$(echo "$LATEST" | cut -d. -f3)
            NEXT="v${MAJOR}.${MINOR}.$((PATCH+1))"
          fi

          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Create release
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
