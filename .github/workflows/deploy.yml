name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
          role-chaining: true

      # HTML: short cache (5 min) so visitors see updates quickly
      - name: Sync HTML
        run: |
          aws s3 sync . s3://${{ vars.SITE_BUCKET }}/ \
            --delete \
            --cache-control "public, max-age=300" \
            --exclude "*" \
            --include "*.html" \
            --include "es/*.html"

      # Assets: long cache (1 year) — CSS/JS/images rarely change
      - name: Sync assets
        run: |
          aws s3 sync . s3://${{ vars.SITE_BUCKET }}/ \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --exclude ".github/*" \
            --exclude ".gitignore" \
            --exclude "LICENSE" \
            --exclude "README.md"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CF_DISTRIBUTION_ID }} \
            --paths "/*"
