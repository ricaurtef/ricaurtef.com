name: Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "*.html"
      - "*.css"
      - "*.js"
      - "robots.txt"
      - "sitemap.xml"
      - "es/**"
      - "img/**"

permissions:
  contents: read
  deployments: write
  id-token: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
          role-chaining: true

      - name: Cache-bust asset references
        run: |
          CSS_HASH=$(md5sum style.css | cut -c1-8)
          JS_HASH=$(md5sum theme.js | cut -c1-8)
          sed -i "s|style\.css|style.css?v=${CSS_HASH}|g" index.html es/index.html 404.html
          sed -i "s|theme\.js|theme.js?v=${JS_HASH}|g" index.html es/index.html 404.html

      - name: Sync HTML
        run: |
          aws s3 sync . s3://${{ vars.PREVIEW_BUCKET }}/ \
            --delete \
            --cache-control "public, max-age=300" \
            --exclude "*" \
            --include "*.html" \
            --include "es/*.html"

      - name: Sync assets
        run: |
          aws s3 sync . s3://${{ vars.PREVIEW_BUCKET }}/ \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --exclude ".git*" \
            --exclude ".github/*" \
            --exclude "LICENSE" \
            --exclude "README.md"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.PREVIEW_CF_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Create deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.pull_request.head.sha,
              environment: 'preview',
              auto_merge: false,
              required_contexts: [],
              transient_environment: true,
            });

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              environment_url: 'https://preview.ricaurtef.com',
              log_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
