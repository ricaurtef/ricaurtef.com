<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Rubén Ricaurte</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="/img/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
  <script src="/theme.js"></script>
</head>
<body>

  <header class="header">
    <a href="/" class="prompt-logo" aria-label="ricaurtef.com — home">
      <span class="seg s1" aria-hidden="true" title="Ubuntu">
        <svg viewBox="0 0 16 16" fill="none">
          <circle cx="8"    cy="8"    r="6.2" stroke="#ebdbb2" stroke-width="1.3" fill="none"/>
          <circle cx="13.2" cy="8"    r="1.7" fill="#ebdbb2"/>
          <circle cx="5.4"  cy="3.5"  r="1.7" fill="#ebdbb2"/>
          <circle cx="5.4"  cy="12.5" r="1.7" fill="#ebdbb2"/>
          <circle cx="8"    cy="8"    r="1.3" fill="#ebdbb2"/>
        </svg>
      </span>
      <span class="seg s2">rricaurte</span>
      <span class="seg s3 hide-sm">~</span>
      <span class="seg s4 hide-sm" id="clock-seg">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="8" cy="8" r="6"/><path d="M8 5v3.2l2 1.3"/></svg>
        <span id="clock-txt">--:--</span>
      </span>
      <span class="seg s5">$<span class="cursor">_</span></span>
    </a>

    <nav class="nav" aria-label="Primary">
      <a class="nav-link" href="/">Home</a>
      <span class="sep" aria-hidden="true">·</span>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </nav>
  </header>

  <div class="wrap">
    <section class="hero" id="intro">
      <p class="watermark" aria-hidden="true">404</p>
      <div class="hero-inner">
        <div class="hero-intro">
          <div class="eyebrow"><span class="num">err</span> · page not found</div>
          <h1>Lost in <em>the cloud</em>.</h1>
          <p class="lede">
            The page you're looking for doesn't exist or has been moved.
            Head back to the <a href="/" style="color: var(--teal); text-decoration: underline;">homepage</a>.
          </p>
        </div>
      </div>
    </section>
  </div>

  <footer class="foot">
    <div class="trail">&copy; 2026 Rubén Ricaurte · ricaurtef.com</div>
    <div class="build">
      <span class="ok">● build green</span>
      <span>·</span>
      <span>cloudfront us-east-1</span>
    </div>
  </footer>

  <script>
    (function () {
      function updateClock() {
        var d  = new Date();
        var hh = String(d.getHours()).padStart(2, '0');
        var mm = String(d.getMinutes()).padStart(2, '0');
        var el = document.getElementById('clock-txt');
        if (el) el.textContent = hh + ':' + mm;
      }
      updateClock();
      setInterval(updateClock, 30000);
    })();
  </script>

</body>
</html>
